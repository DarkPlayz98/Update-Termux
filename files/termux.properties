# ── termux.properties ──────────────────────────
# Part of github.com/DarkPlayz98/termux-setup

# Extra keys row (shown above keyboard)
extra-keys = [['ESC','TAB','CTRL','ALT','-','UP','DOWN'],['FN','|','/','\\','LEFT','HOME','RIGHT']]

# Vibrate on bell instead of sound
bell-character=vibrate

# Let Termux open external apps
allow-external-apps=true

# Default font size
default-fontsize=14

# Fullscreen mode
fullscreen=false
